<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>❤️</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
}

/* ARKA PLAN */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.2;
  filter: blur(8px);
  transition: opacity 1s;
}

/* CANVAS */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* YAZI */
#text {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  color: #ff9a9e;
  font-size: 18px;
  opacity: 0.8;
}
</style>
</head>

<body>

<img id="bg">
<canvas id="canvas"></canvas>
<div id="text">sen benim en güzel tesadüfümsün ❤️</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/wxukv3.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== MÜZİK ===== */
const music = document.getElementById("music");

document.addEventListener("click", () => {
  music.play();
}, { once: true });


/* ===== CANVAS ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;


/* ===== RESİMLER (GARANTİLİ YÜKLEME) ===== */
const imageURLs = [
"https://i.ibb.co/JW8RVvkY/image3.jpg",
"https://i.ibb.co/Qj6vztzh/image2.jpg",
"https://i.ibb.co/whhD4kfy/image1.jpg",
"https://i.ibb.co/spcP7F7x/image0.jpg"
];

let images = [];
let loaded = 0;
let current = 0;

const bg = document.getElementById("bg");

imageURLs.forEach((src, i) => {
  const img = new Image();
  img.src = src;

  img.onload = () => {
    images[i] = img;
    loaded++;

    if (loaded === imageURLs.length) {
      bg.src = images[0].src;
    }
  };

  img.onerror = () => {
    console.log("yüklenemedi:", src);
  };
});

/* RESİM GEÇİŞ */
setInterval(() => {
  if (images.length === 0) return;

  current = (current + 1) % images.length;

  bg.style.opacity = 0;

  setTimeout(() => {
    bg.src = images[current].src;
    bg.style.opacity = 0.2;
  }, 500);

}, 4000);


/* ===== KALP ===== */
function heart(t, s = 8) { // KÜÇÜK
  return {
    x: 16 * Math.pow(Math.sin(t), 3) * s,
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * s
  };
}

class Particle {
  constructor() {
    this.t = Math.random() * Math.PI * 2;
    this.speed = 0.002 + Math.random() * 0.002;
    this.size = Math.random() * 2 + 0.5;
  }

  update() {
    this.t += this.speed;
    const p = heart(this.t, 8);

    this.x = canvas.width / 2 + p.x;
    this.y = canvas.height / 2 + p.y;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = "#ff9a9e";
    ctx.fill();
  }
}

const particles = [];
for (let i = 0; i < 700; i++) {
  particles.push(new Particle());
}


/* ===== ANİMASYON ===== */
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}

animate();


/* ===== RESIZE ===== */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>❤️</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

/* ARKA PLAN */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.2;
  filter: blur(8px);
  transition: opacity 1s;
  z-index: 0;
}

/* CANVAS */
canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}

/* MODERN ANMA VE ALT YAZI ALANI */
#text-container {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  z-index: 3;
  pointer-events: none;
}

#pofi-text {
  color: #ffffff;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 2px;
  opacity: 0.6;
  margin-bottom: 8px;
  text-transform: uppercase;
}

#text {
  color: #ff9a9e;
  font-size: 18px;
  letter-spacing: 1px;
  opacity: 0.9;
}

/* AKAN FOTOĞRAFLAR */
.floating-img {
  position: absolute;
  width: 120px;
  height: 160px;
  object-fit: cover;
  border-radius: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  border: 1px solid rgba(255, 255, 255, 0.1);
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  transform: scale(0.9) rotate(0deg);
  transition: opacity 1s ease, transform 0.5s ease;
}
</style>
</head>

<body>

<img id="bg">
<canvas id="canvas"></canvas>

<div id="text-container">
  <div id="pofi-text">♾️ kadar huzurla Pofimiz..</div>
  <div id="text-sub"></div>
  <div id="text">Sen benim en güzel tesadüfümsün ❤️</div>
</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/wxukv3.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== MÜZİK ===== */
const music = document.getElementById("music");

document.addEventListener("click", () => {
  music.play();
}, { once: true });


/* ===== CANVAS ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;


/* ===== RESİMLER (GARANTİLİ YÜKLEME) ===== */
const imageURLs = [
"https://i.ibb.co/JW8RVvkY/image3.jpg",
"https://i.ibb.co/Qj6vztzh/image2.jpg",
"https://i.ibb.co/whhD4kfy/image1.jpg",
"https://i.ibb.co/spcP7F7x/image0.jpg",
"https://i.ibb.co/qLxPWBFz/image4.jpg",
"https://i.ibb.co/fY0h0fW6/image5.jpg",
"https://i.ibb.co/4nd7fFbD/image6.jpg",
"https://i.ibb.co/z1B5XbQ/image7.jpg",
"https://i.ibb.co/KptkXGrm/image8.jpg",
"https://i.ibb.co/Swy6QdxB/image9.jpg",
"https://i.ibb.co/d402g1w6/image10.jpg",
"https://i.ibb.co/rGwYnkpg/image11.jpg",
"https://i.ibb.co/cK5pG3Kw/image12.jpg",
"https://i.ibb.co/LzDR6d6t/image13.jpg",
"https://i.ibb.co/39ryrMbC/image14.jpg",
"https://i.ibb.co/jkVdjfGL/image15.jpg",
"https://i.ibb.co/hRwXK4rc/image16.jpg",
"https://i.ibb.co/mQCcDCd/image17.jpg",
"https://i.ibb.co/5W4wnG3F/image18.jpg",
"https://i.ibb.co/h0DP7pc/image19.jpg",
"https://i.ibb.co/Y7gGCC1j/image20.jpg",
"https://i.ibb.co/3YkxCCRk/image21.jpg",
"https://i.ibb.co/dwL1MBcJ/image22.jpg",
"https://i.ibb.co/zgDNgwY/image23.jpg",
"https://i.ibb.co/yc4kcKn1/image24.jpg",
"https://i.ibb.co/ztrdfts/image25.jpg",
"https://i.ibb.co/tTJr9F0V/image26.jpg",
"https://i.ibb.co/VpMtsg0J/image27.jpg",
"https://i.ibb.co/5gvbPcxv/image28.jpg",
"https://i.ibb.co/QLzMLX5/image29.jpg",
"https://i.ibb.co/nNm7SWjH/image30.jpg",
"https://i.ibb.co/PvPw9f7N/image31.jpg",
"https://i.ibb.co/RGHr3TDb/image32.jpg",
"https://i.ibb.co/1YhRHvTk/image33.jpg",
"https://i.ibb.co/DDCLpNvT/image34.jpg",
"https://i.ibb.co/VcHQm0dB/image35.jpg",
"https://i.ibb.co/3mr30Tzx/image36.jpg",
"https://i.ibb.co/B2r7J5D6/image37.jpg",
"https://i.ibb.co/YFn36XW6/image38.jpg",
"https://i.ibb.co/Q3gc5d8x/image39.jpg",
"https://i.ibb.co/Jwycrvg7/image40.jpg"
];

let images = [];
let loaded = 0;
let current = 0;

const bg = document.getElementById("bg");

imageURLs.forEach((src, i) => {
  const img = new Image();
  img.src = src;

  img.onload = () => {
    images[i] = img;
    loaded++;

    if (loaded === imageURLs.length) {
      bg.src = images[0].src;
      // Resimler yüklenince akan galeri döngüsünü başlat
      startFloatingImages();
    }
  };

  img.onerror = () => {
    console.log("yüklenemedi:", src);
  };
});

/* RESİM GEÇİŞ */
setInterval(() => {
  if (images.length === 0) return;

  current = (current + 1) % images.length;

  bg.style.opacity = 0;

  setTimeout(() => {
    bg.src = images[current].src;
    bg.style.opacity = 0.2;
  }, 500);

}, 4000);


/* ===== SAĞ/SOL AKAN MODERN FOTOĞRAFLAR ===== */
function createFloatingImage(side) {
  if (images.length === 0) return;

  const imgEl = document.createElement("img");
  // Rastgele bir resim seç
  const randomImg = images[Math.floor(Math.random() * images.length)];
  imgEl.src = randomImg.src;
  imgEl.className = "floating-img";

  // Konumlandırma (Sağ veya Sol şerit)
  const padding = 40; 
  if (side === "left") {
    imgEl.style.left = `${Math.random() * 60 + padding}px`;
  } else {
    imgEl.style.right = `${Math.random() * 60 + padding}px`;
  }

  // Başlangıç noktası (Ekranın altından başlar)
  let posY = window.innerHeight + 50;
  imgEl.style.top = `${posY}px`;
  
  // Rastgele hafif dönüş açısı
  const rotation = (Math.random() - 0.5) * 15; 
  imgEl.style.transform = `scale(0.9) rotate(${rotation}deg)`;

  document.body.appendChild(imgEl);

  // Görünürlük ve hareket parametreleri
  let opacity = 0;
  const speed = 0.6 + Math.random() * 0.5; // Yukarı akış hızı

  function stream() {
    posY -= speed;
    imgEl.style.top = `${posY}px`;

    // Girişte yavaşça belirme, çıkışta yavaşça kaybolma (Üstten silinme efekti)
    if (posY > window.innerHeight - 200) {
      opacity = Math.min(0.6, opacity + 0.02); // Maksimum 0.6 opaklık (arka planda zarif durması için)
    } else if (posY < 200) {
      opacity = Math.max(0, opacity - 0.015);
    } else {
      opacity = 0.6;
    }
    
    imgEl.style.opacity = opacity;

    if (posY > -200 && opacity >= 0) {
      requestAnimationFrame(stream);
    } else {
      imgEl.remove();
    }
  }

  // Belirdikten sonra hafif büyüme efekti ile animasyonu başlat
  setTimeout(() => {
    imgEl.style.transform = `scale(1) rotate(${rotation}deg)`;
    requestAnimationFrame(stream);
  }, 50);
}

function startFloatingImages() {
  // Sol taraf akışı
  setInterval(() => createFloatingImage("left"), 5000);
  // Sağ taraf akışı (Dengeli olmaları için gecikmeli başlar)
  setTimeout(() => {
    setInterval(() => createFloatingImage("right"), 5000);
  }, 2500);
}


/* ===== KALP ===== */
function heart(t, s = 8) { // KÜÇÜK
  return {
    x: 16 * Math.pow(Math.sin(t), 3) * s,
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * s
  };
}

class Particle {
  constructor() {
    this.t = Math.random() * Math.PI * 2;
    this.speed = 0.002 + Math.random() * 0.002;
    this.size = Math.random() * 2 + 0.5;
  }

  update() {
    this.t += this.speed;
    const p = heart(this.t, 8);

    this.x = canvas.width / 2 + p.x;
    this.y = canvas.height / 2 + p.y;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = "#ff9a9e";
    ctx.fill();
  }
}

const particles = [];
for (let i = 0; i < 700; i++) {
  particles.push(new Particle());
}


/* ===== ANİMASYON ===== */
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}

animate();


/* ===== RESIZE ===== */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
